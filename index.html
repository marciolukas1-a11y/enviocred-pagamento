<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento Confirmado — Envio CRED</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Confete */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Card principal */
  .card {
    position: relative;
    z-index: 10;
    background: linear-gradient(145deg, #111111, #1e1e1e);
    border: 2px solid #f0c040;
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 60px rgba(240, 192, 64, 0.15), 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.8s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* Ícone de check animado */
  .check-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f0c040, #c8a84b);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 50px;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both, pulse 2s ease-in-out 1s infinite;
    box-shadow: 0 0 30px rgba(240, 192, 64, 0.4);
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(240, 192, 64, 0.4); }
    50%       { box-shadow: 0 0 50px rgba(240, 192, 64, 0.7); }
  }

  .brand {
    font-size: 13px;
    letter-spacing: 4px;
    color: #c8a84b;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  h1 span {
    color: #f0c040;
  }

  .subtitle {
    font-size: 15px;
    color: #aaaaaa;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, transparent, #f0c040, transparent);
    margin: 0 auto 28px;
  }

  /* Badge Bom Pagador */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(240,192,64,0.15), rgba(200,168,75,0.1));
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 50px;
    padding: 10px 20px;
    margin-bottom: 28px;
    animation: fadeIn 0.5s ease 1s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .badge-icon {
    font-size: 18px;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .badge-text {
    font-size: 13px;
    font-weight: 700;
    color: #f0c040;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stars {
    font-size: 16px;
    letter-spacing: 2px;
  }

  /* Ícones animados flutuando */
  .floating-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
  }

  .icon-item {
    font-size: 28px;
    animation: float 3s ease-in-out infinite;
  }

  .icon-item:nth-child(1) { animation-delay: 0s; }
  .icon-item:nth-child(2) { animation-delay: 0.5s; }
  .icon-item:nth-child(3) { animation-delay: 1s; }
  .icon-item:nth-child(4) { animation-delay: 1.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-10px); }
  }

  .footer-text {
    font-size: 12px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Cantos decorativos */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: #f0c040;
    border-style: solid;
    opacity: 0.5;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
</style>
</head>
<body>

<!-- Confete -->
<div class="confetti-container" id="confetti"></div>

<!-- Card -->
<div class="card">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="check-circle">✅</div>

  <div class="brand">✦ Envio CRED ✦</div>
  <h1>Pagamento <span>Confirmado!</span> 🎉</h1>
  <p class="subtitle">Obrigado pela confiança!<br>Seu pagamento foi recebido com sucesso.</p>

  <div class="divider"></div>

  <div class="badge">
    <span class="badge-icon">⭐</span>
    <span class="badge-text">Parceiro Envio CRED</span>
    <span class="stars">⭐⭐</span>
  </div>

  <div class="floating-icons">
    <span class="icon-item">💰</span>
    <span class="icon-item">🏆</span>
    <span class="icon-item">💙</span>
    <span class="icon-item">🎊</span>
  </div>

  <p class="footer-text">Envio CRED — sempre com você</p>
</div>

<script>
  // Gerar confete colorido
  const colors = ['#f0c040','#ffffff','#c8a84b','#4fc3f7','#81c784','#ff8a65','#ce93d8'];
  const container = document.getElementById('confetti');

  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 8 + 6}px;
      height: ${Math.random() * 8 + 6}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${Math.random() * 4 + 3}s;
      animation-delay: ${Math.random() * 5}s;
    `;
    container.appendChild(el);
  }
</script>

</body>
</html>
